<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>批量计算 - 考察站风-光-氢-储-柴联合优化调度系统</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="batch-page">
  <main class="app-shell batch-shell">
    <header class="topbar">
      <a class="brand" href="index.html" data-i18n="brand">考察站风-光-氢-储-柴联合优化调度系统</a>
      <nav class="main-nav" aria-label="主功能导航">
        <a href="index.html" data-i18n="nav.home">系统首页</a>
        <a href="schemes.html" data-i18n="nav.schemes">输入配置</a>
        <a href="solve.html" data-i18n="nav.solve">优化调度</a>
        <a href="verify.html" data-i18n="nav.verify">方案校核</a>
        <a href="comparison.html" data-i18n="nav.comparison">结果对比</a>
        <a class="active" href="batch.html" data-i18n="nav.batch">批量计算</a>
      </nav>
      <div class="topbar-tools">
        <div class="language-switch" data-language-switch></div>
        <div class="user-status" data-auth-user hidden>
          <span data-i18n="auth.user">当前用户</span><strong data-auth-username></strong><em data-auth-role></em>
          <button type="button" data-logout data-i18n="auth.logout">退出</button>
        </div>
      </div>
    </header>

    <section class="workspace batch-workbench">
      <div id="batchError" class="status-error" hidden></div>
      <section class="batch-task-panel" aria-labelledby="batchTaskTitle">
        <div class="batch-task-head">
          <div id="batchTaskTabs" class="batch-tabs" role="tablist" aria-label="批量任务类型">
            <button class="batch-tab active" type="button" data-task-page="optimization" role="tab" aria-selected="true">
              <span>优化调度任务</span><strong>0</strong>
            </button>
            <button class="batch-tab" type="button" data-task-page="verification" role="tab" aria-selected="false">
              <span>方案校核任务</span><strong>0</strong>
            </button>
            <button class="batch-tab" type="button" data-task-page="all" role="tab" aria-selected="false">
              <span>全部任务</span><strong>0</strong>
            </button>
          </div>
          <div class="batch-head-actions">
            <span id="batchLastUpdated" class="batch-last-updated">尚未刷新</span>
            <button id="refreshTasks" class="small" type="button" data-i18n="common.refresh">刷新</button>
          </div>
        </div>

        <div class="batch-filter-row">
          <h1 id="batchTaskTitle">优化调度任务</h1>
          <label id="batchSchemeFilterWrap" class="batch-scheme-filter" hidden>
            <span>方案名称</span>
            <select id="batchSchemeFilter" aria-label="按方案名称筛选"></select>
          </label>
          <div id="batchSummary" class="batch-summary" aria-label="任务状态汇总"></div>
        </div>

        <div id="batchTaskTable" class="data-table batch-task-table-shell"></div>
      </section>
    </section>
  </main>
  <script src="assets/common.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/theme.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/batch.js"></script>
</body>
</html>
