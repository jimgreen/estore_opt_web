<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>结果对比 - 考察站风-光-氢-储-柴联合优化调度系统</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="comparison-page">
  <main class="app-shell comparison-shell">
    <header class="topbar">
      <a class="brand" href="index.html" data-i18n="brand">考察站风-光-氢-储-柴联合优化调度系统</a>
      <nav class="main-nav" aria-label="主功能导航">
        <a href="index.html" data-i18n="nav.home">系统首页</a>
        <a href="schemes.html" data-i18n="nav.schemes">输入配置</a>
        <a href="solve.html" data-i18n="nav.solve">优化求解</a>
        <a href="verify.html" data-i18n="nav.verify">方案校核</a>
        <a class="active" href="comparison.html" data-i18n="nav.comparison">结果对比</a>
        <a href="batch.html" data-i18n="nav.batch">批量计算</a>
      </nav>
      <div class="topbar-tools">
        <div class="language-switch" data-language-switch></div>
        <div class="user-status" data-auth-user hidden>
          <span data-i18n="auth.user">当前用户</span><strong data-auth-username></strong><em data-auth-role></em>
          <button type="button" data-logout data-i18n="auth.logout">退出</button>
        </div>
      </div>
    </header>

    <section class="comparison-workbench">
      <div id="comparisonError" class="status-error" hidden></div>

      <section class="comparison-picker-panel">
        <div class="comparison-picker-head">
          <div>
            <span class="section-label">待对比结果</span>
            <h1>结果对比</h1>
          </div>
          <div class="summary-actions">
            <button id="refreshComparison" class="small" type="button" data-i18n="common.refresh">刷新</button>
            <button id="selectLatest" class="small" type="button" data-i18n="comparison.latest">选择最近结果</button>
            <button id="addComparisonSlot" class="primary small" type="button">添加对比项</button>
            <button id="clearSelection" class="danger small" type="button" data-i18n="comparison.clear">清空选择</button>
          </div>
        </div>
        <div id="comparisonSlotRail" class="comparison-slot-rail" aria-label="待对比结果队列"></div>
      </section>

      <section class="comparison-result-panel">
        <aside class="comparison-mode-panel">
          <h2 id="comparisonModeTitle">指标对比</h2>
          <div id="comparisonScopeTabs" class="comparison-scope-tabs" aria-label="对比视图范围"></div>
          <div id="comparisonRenderTabs" class="comparison-render-tabs" aria-label="展示方式"></div>
          <div id="comparisonMetricList" class="comparison-metric-list" aria-label="指标列表"></div>
        </aside>

        <section class="comparison-main-panel">
          <div class="comparison-toolbar">
            <div>
              <h2 id="comparisonTitle">请选择 1 个或多个结果</h2>
              <span id="comparisonMeta" class="sheet-meta">支持增删、排序、表格、曲线和柱状图展示。</span>
            </div>
            <div id="comparisonLegend" class="comparison-legend"></div>
          </div>
          <div id="comparisonTable" class="data-table comparison-output comparison-table-output" hidden></div>
          <div id="comparisonCurve" class="comparison-output comparison-chart-output" hidden></div>
          <div id="comparisonBars" class="comparison-output comparison-chart-output" hidden></div>
        </section>
      </section>
    </section>
  </main>
  <script src="assets/common.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/theme.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/comparison.js"></script>
</body>
</html>
